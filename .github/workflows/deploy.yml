name: Deploy GreenPulse to GCP

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: greenpulse-gcp-project-id  # Update with your GCP Project ID
  GAR_LOCATION: us-central1              # Artifact Registry region
  SERVICE_NAME: greenpulse-app           # Cloud Run Service Name
  REGION: us-central1                    # Cloud Run service region

jobs:
  deploy-cloud-run:
    name: Build & Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Authentication to GCP
      # Requirements: Setup workload identity federation or service account keys
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Set this secret in GitHub

      # Setup Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to Google Artifact Registry
      - name: Authorize Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Build and Push Container
      - name: Build and Push Container
        run: |
          TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$TAG" .
          docker push "$TAG"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # Deploy to Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: --allow-unauthenticated
